apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mysql-allow-auth-backend
  namespace: auth
spec:
  podSelector:
    matchLabels:
      app: mysql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: auth-backend
        - podSelector:
            matchLabels:
              app: users-backend
      ports:
        - protocol: TCP
          port: 3306